name: Daily Stock Screener

on:
  schedule:
    - cron: "0 15 * * 1-5"  # 3pm UTC = 10am ET (EST) / 11am EDT, Monday-Friday
  workflow_dispatch:          # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screener:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit unsubscribed.json back to repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config.py from secrets
        run: |
          cat > config.py << 'EOF'
          GMAIL_ADDRESS = "${{ secrets.GMAIL_ADDRESS }}"
          GMAIL_APP_PASSWORD = "${{ secrets.GMAIL_APP_PASSWORD }}"
          GOOGLE_SHEET_CSV_URL = "${{ secrets.GOOGLE_SHEET_CSV_URL }}"
          EOF

      - name: Run screener
        run: python run.py

      - name: Save persistent state back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add unsubscribed.json last_results.json
          git diff --cached --quiet || git commit -m "Update persistent state [skip ci]"
          git push
